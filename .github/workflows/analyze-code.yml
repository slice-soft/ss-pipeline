name: Analyze Repository Languages with Linguist

# Reusable workflow for analyzing repository languages
# with GitHub Linguist. Generates a report showing the detected
# languages and their proportions in the project codebase.
#
# Typical usage:
#   - analyze:
#       uses: slice-soft/ss-pipeline/.github/workflows/analyze-code.yml@v0
#       with:
#         workdir: .

on:
  workflow_call:
    inputs:
      workdir:
        description: "The path to the working directory"
        required: false
        type: string
        default: "."

jobs:
  linguist-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Linguist gem
        run: gem install github-linguist

      - name: Run Linguist analysis and save to file
        run: |
          echo "Linguist analysis result:"
          github-linguist > github-linguist.txt
          cat github-linguist.txt

      - name: Upload Linguist report
        uses: actions/upload-artifact@v4
        with:
          name: linguist-report
          path: github-linguist.txt
