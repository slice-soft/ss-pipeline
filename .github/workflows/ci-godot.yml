name: CI - Godot Headless Tests

# Reusable workflow that runs a GDScript test suite headlessly.
# Downloads and caches the requested Godot version, reimports the project
# to rebuild the script class cache, then executes the provided test command.
#
# Inputs:
#   godot-version  Godot version to use, e.g. "4.5" (default)
#   test-command   Full shell command used to run the test suite
#
# The test command must exit with code 1 on failure and 0 on success.
#
# Typical usage:
#   test:
#     uses: slice-soft/ss-pipeline/.github/workflows/ci-godot.yml@v0
#     with:
#       godot-version: "4.5"
#       test-command: godot --headless --editor --path . --script test/runner.gd

on:
  workflow_call:
    inputs:
      godot-version:
        description: "Godot stable version (e.g. 4.5)"
        type: string
        default: "4.5"
      test-command:
        description: "Full shell command used to run the test suite"
        type: string
        default: "godot --headless --path . --script test/runner.gd"

jobs:
  test:
    name: Godot ${{ inputs.godot-version }} — tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/bin
          key: godot-${{ inputs.godot-version }}-linux

      - name: Download Godot ${{ inputs.godot-version }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.godot-version }}"
          FILENAME="Godot_v${VERSION}-stable_linux.x86_64"
          URL="https://github.com/godotengine/godot/releases/download/${VERSION}-stable/${FILENAME}.zip"
          mkdir -p ~/.local/share/godot/bin
          wget -q "$URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_extract
          cp "/tmp/godot_extract/${FILENAME}" ~/.local/share/godot/bin/godot
          chmod +x ~/.local/share/godot/bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/.local/share/godot/bin" >> "$GITHUB_PATH"

      - name: Rebuild script class cache
        # Required when new class_name scripts are added since the last import.
        # Runs the editor headlessly to regenerate .godot/global_script_class_cache.cfg.
        run: godot --headless --editor --path . --quit 2>&1 || true

      - name: Run tests
        shell: bash
        run: |
          ${{ inputs.test-command }}
