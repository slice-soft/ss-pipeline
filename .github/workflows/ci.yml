name: Continuous Integration - Pull Request Validation

# Main workflow that validates PRs when they are opened, labeled/unlabeled, or synchronized.
# Delegates validation to the validate-pr.yml workflow.
# Verifies that titles follow Conventional Commits.

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
    branches:
      - main
jobs:
  validate:
    uses: slice-soft/ss-pipeline/.github/workflows/validate-pr.yml@v0
    secrets: inherit
