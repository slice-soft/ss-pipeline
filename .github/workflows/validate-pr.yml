name: Validate PR - Conventional Commits

# Workflow reusable que valida que los títulos de PR sigan Conventional Commits.
# Requiere que el título tenga formato: type(scope): description
# Types permitidos: feat, fix, chore, docs, refactor, perf, test, ci, build

on:
  workflow_call:
jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (conventional commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
          requireScope: false