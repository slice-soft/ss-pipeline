name: Build Node.js Artifact

# Reusable workflow to build Node.js projects and upload the result
# as an artifact for downstream jobs (deploy, release, etc.).
#
# Typical usage:
#   build:
#     uses: slice-soft/ss-pipeline/.github/workflows/build-node.yml@v0
#     with:
#       artifact-name: cdn-dist
#       version: ${{ needs.release.outputs.tag_name }}

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"

      build-command:
        description: "Build command to run"
        type: string
        default: "npm run build"

      artifact-name:
        description: "Artifact name uploaded with actions/upload-artifact"
        type: string
        required: true

      artifact-path:
        description: "Directory or file pattern to include in the artifact"
        type: string
        default: "dist/"

      retention-days:
        description: "Artifact retention period in GitHub, in days"
        type: number
        default: 1

      version:
        description: "Optional version (with or without 'v'). Injected as the VERSION env var into the build command."
        type: string
        default: ""

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build-command }}
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
