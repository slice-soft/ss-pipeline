name: Build Node.js Artifact

# Workflow reusable para hacer build de proyectos Node.js y subir el resultado
# como artifact para que jobs posteriores (deploy, release, etc.) lo consuman.
#
# Uso típico:
#   build:
#     uses: slice-soft/ss-pipeline/.github/workflows/build-node.yml@v0
#     with:
#       artifact-name: cdn-dist
#       version: ${{ needs.release.outputs.tag_name }}

on:
  workflow_call:
    inputs:
      node-version:
        description: "Versión de Node.js"
        type: string
        default: "22"

      build-command:
        description: "Comando de build a ejecutar"
        type: string
        default: "npm run build"

      artifact-name:
        description: "Nombre del artifact que se sube con actions/upload-artifact"
        type: string
        required: true

      artifact-path:
        description: "Directorio o patrón de archivos a incluir en el artifact"
        type: string
        default: "dist/"

      retention-days:
        description: "Días de retención del artifact en GitHub"
        type: number
        default: 1

      version:
        description: "Versión opcional (con o sin 'v'). Se inyecta como env var VERSION al build command."
        type: string
        default: ""

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ inputs.build-command }}
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
