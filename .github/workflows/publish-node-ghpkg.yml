name: Publish Node.js Package to GitHub Packages

# Reusable workflow to publish a Node.js package to GitHub Packages (npm registry).
# Does NOT publish to the public npm registry.
# Typical usage:
#   publish:
#     needs: [release, build]
#     uses: slice-soft/ss-pipeline/.github/workflows/publish-node-ghpkg.yml@v0
#     with:
#       artifact-name: native-dist
#       node-version: "22"
#     secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"

      artifact-name:
        description: "Name of the artifact uploaded by a prior build job"
        type: string
        required: true

      artifact-path:
        description: "Directory to extract the artifact into (relative to repo root)"
        type: string
        default: "dist/"

      working-directory:
        description: "Working directory for npm publish (must contain a package.json)"
        type: string
        default: "."

    secrets:
      GITHUB_TOKEN:
        description: "Token with packages:write scope (usually secrets.GITHUB_TOKEN)"
        required: true

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://npm.pkg.github.com/"
          scope: "@slice-soft"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

      - name: Install dependencies (production only)
        working-directory: ${{ inputs.working-directory }}
        run: npm ci --omit=dev

      - name: Publish package
        working-directory: ${{ inputs.working-directory }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
