name: Release Pipeline - Automatic Release on Main

# Workflow que se ejecuta automáticamente cuando se pushea a main.
# Delega a create-release.yml para crear releases automáticas
# con release-please basado en commits convencionales.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pipeline:
    uses: slice-soft/ss-pipeline/.github/workflows/create-release.yml@v0
    secrets: inherit