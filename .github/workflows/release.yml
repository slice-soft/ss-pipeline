name: Release Pipeline - Automatic Release on Main

# Workflow that runs automatically when code is pushed to main.
# Delegates to create-release.yml to create automatic releases
# with release-please based on conventional commits.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pipeline:
    uses: slice-soft/ss-pipeline/.github/workflows/create-release.yml@v0
    secrets: inherit
