name: Deploy to Cloudflare R2 CDN

# Reusable workflow for uploading static files to a Cloudflare R2 bucket.
#
# The calling repository is responsible for:
#   1. Building and minifying the files
#   2. Uploading them as an artifact (actions/upload-artifact)
#   3. Calling this workflow with the artifact name and destination
#
# Structure generated in R2:
#   {destination-prefix}v{version}/   ← immutable cache (1 year by default)
#   {destination-prefix}latest/       ← short cache (1h by default, optional)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Artifact name containing the files to upload (created with actions/upload-artifact in the previous job)"
        type: string
        required: true

      destination-prefix:
        description: "Prefix in the R2 bucket. Example: 'design-system/', 'keel/docs/'. Must end with '/'."
        type: string
        required: true

      version:
        description: "Version with or without 'v' (for example 'v1.2.0' or '1.2.0'). The 'v' prefix is normalized automatically."
        type: string
        required: true

      upload-latest:
        description: "If true, also syncs files to {prefix}latest/ with a short cache."
        type: boolean
        default: true

      versioned-cache-control:
        description: "Cache-Control for versioned (immutable) files."
        type: string
        default: "public, max-age=31536000, immutable"

      latest-cache-control:
        description: "Cache-Control for files in latest/."
        type: string
        default: "public, max-age=3600, must-revalidate"

    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ENDPOINT:
        required: true
      R2_BUCKET:
        required: true
      CDN_BASE_URL:
        required: false

jobs:
  deploy:
    name: Upload to R2
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: cdn-files/

      - name: Configure AWS CLI (R2 S3-compatible)
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto

      - name: Normalize version
        id: ver
        run: echo "VALUE=${RAW#v}" >> $GITHUB_OUTPUT
        env:
          RAW: ${{ inputs.version }}

      - name: Upload versioned files
        env:
          BUCKET:    ${{ secrets.R2_BUCKET }}
          ENDPOINT:  ${{ secrets.R2_ENDPOINT }}
          PREFIX:    ${{ inputs.destination-prefix }}
          VERSION:   ${{ steps.ver.outputs.VALUE }}
          CACHE:     ${{ inputs.versioned-cache-control }}
        run: |
          aws s3 sync cdn-files/ \
            s3://${BUCKET}/${PREFIX}${VERSION}/ \
            --endpoint-url "${ENDPOINT}" \
            --cache-control "${CACHE}" \
            --no-progress

      - name: Upload latest files
        if: inputs.upload-latest == true
        env:
          BUCKET:    ${{ secrets.R2_BUCKET }}
          ENDPOINT:  ${{ secrets.R2_ENDPOINT }}
          PREFIX:    ${{ inputs.destination-prefix }}
          CACHE:     ${{ inputs.latest-cache-control }}
        run: |
          aws s3 sync cdn-files/ \
            s3://${BUCKET}/${PREFIX}latest/ \
            --endpoint-url "${ENDPOINT}" \
            --cache-control "${CACHE}" \
            --delete \
            --no-progress
