name: "Node Requirements Pipeline"
on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: true
        default: "22"
        type: string

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name}}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Install dependencies
        run: npm ci

  tests:
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Run tests
        run: npm test
      

  code-analysis:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Run Code Analysis
        run: npm run lint