name: "Node Requirements Pipeline"
on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: true
        default: "22"
        type: string
      project-type:
        description: "Type of Node.js project (e.g., library, application)"
        required: true
        default: "library"
        type: string
      package-file:
        description: "Path to the package file (e.g., package.json)"
        required: true
        default: "./package.json"
        type: string

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name}}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Install dependencies
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: npm ci

  tests:
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Run tests
        run: npm test

  validate-package-version:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '${{ inputs.node-version }}'
          registry-url: https://npm.pkg.github.com/
          always-auth: true
      - name: Configure GitHub Packages for npm view
        run: |
          echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com/" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - name: Validate package version
        run: |
          current_version=$(jq -r '.version' '${{ inputs.package-file }}')
          echo "Current version: $current_version"
          package_name=$(jq -r '.name' '${{ inputs.package-file }}')
          echo "Package name: $package_name"
          latest_release=$(npm view "$package_name" version --registry https://npm.pkg.github.com/ || echo "")
          echo "Latest release version: $latest_release"
          # Semver bump validation
          IFS='.' read -r last_major last_minor last_patch <<< "$latest_release"
          patch_version="$last_major.$last_minor.$((last_patch+1))"
          minor_version="$last_major.$((last_minor+1)).0"
          major_version="$((last_major+1)).0.0"

          if [ "$current_version" = "$patch_version" ]; then
            echo "Change type: patch"
          elif [ "$current_version" = "$minor_version" ]; then
            echo "Change type: minor"
          elif [ "$current_version" = "$major_version" ]; then
            echo "Change type: major"
          else
            echo "Error: invalid version bump. Expected one of: $patch_version, $minor_version, $major_version"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
  code-analysis:
    needs: [validate-package-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '${{ inputs.node-version }}'
      - name: Restore Cache
        uses: actions/cache@v3
        id: restore-cache
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: npm-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ env.cache-name }}
      - name: Run Code Analysis
        run: npm run lint