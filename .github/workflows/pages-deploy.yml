# Reusable workflow — Deploy to Cloudflare Pages via Wrangler.
#
# Deployment records (production + previews) are visible in the calling repo's
# GitHub Environments tab. Logs live in GitHub Actions, not in Cloudflare.
#
# Usage from any app repo (.github/workflows/deploy.yml):
#
#   jobs:
#     deploy:
#       uses: slice-soft/ss-pipeline/.github/workflows/pages-deploy.yml@v0
#       with:
#         project-name: ss-keel-metrics
#         directory: dist
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#

name: Deploy to Cloudflare Pages

on:
  workflow_call:
    inputs:
      project-name:
        description: "Cloudflare Pages project name (must match the Terraform resource)."
        required: true
        type: string
      directory:
        description: "Build output directory relative to the repo root (e.g. dist, frontend/dist/app/browser)."
        required: false
        type: string
        default: dist
      build-command:
        description: "Command to build the project."
        required: false
        type: string
        default: npm run build
      working-directory:
        description: "Directory where npm ci and the build command are executed. Use for monorepos (e.g. frontend)."
        required: false
        type: string
        default: "."
      node-version:
        description: "Node.js version."
        required: false
        type: string
        default: "20"
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare API token with Pages edit permissions."
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: "Cloudflare account ID."
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write  # required to create GitHub deployment records

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache-dependency-path: "${{ inputs.working-directory }}/package-lock.json"
          cache: npm

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ inputs.project-name }}
          directory: ${{ inputs.directory }}
          # Passing gitHubToken creates a GitHub Deployment record linked to the commit.
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
