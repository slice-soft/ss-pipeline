name: Terraform Apply (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      terraform-version:
        type: string
        default: "1.9.0"
      plan-prefix:
        description: "Same prefix used in tf-plan.yml"
        type: string
        required: true
    secrets:
      TF_GITHUB_TOKEN:
        required: true
      TF_R2_ACCESS_KEY_ID:
        required: true
      TF_R2_SECRET_ACCESS_KEY:
        required: true
      TF_R2_ENDPOINT:
        required: true
      TF_R2_BUCKET:
        required: true

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Get merged PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '.[0] | {number: .number, head_sha: .head.sha}')
          PR_NUMBER=$(echo $PR_DATA | jq -r '.number')
          HEAD_SHA=$(echo $PR_DATA | jq -r '.head_sha')

          if [ "$PR_NUMBER" = "null" ] || [ -z "$PR_NUMBER" ]; then
            echo "❌ No se encontró PR asociado al commit ${{ github.sha }}"
            exit 1
          fi

          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "HEAD_SHA=${HEAD_SHA}" >> $GITHUB_OUTPUT
          echo "✅ PR #${PR_NUMBER} | HEAD: ${HEAD_SHA}"

      - name: Download plan from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
        run: |
          PLAN_KEY="plans/${{ inputs.plan-prefix }}/pr-${{ steps.pr.outputs.PR_NUMBER }}/${{ steps.pr.outputs.HEAD_SHA }}.tfplan"
          echo "📥 Descargando plan: ${PLAN_KEY}"
          aws s3 cp s3://${{ secrets.TF_R2_BUCKET }}/${PLAN_KEY} \
            ${{ inputs.working-directory }}/tfplan.binary \
            --region auto

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -no-color tfplan.binary 2>&1 | tee apply_output.txt

      - name: Comment apply result on merged PR
        if: always() && steps.pr.outputs.PR_NUMBER != ''
        uses: actions/github-script@v7
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
        with:
          github-token: ${{ secrets.TF_GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const output = fs.readFileSync(path.join(process.env.WORKING_DIR, 'apply_output.txt'), 'utf8');
            const maxLen = 60000;
            const truncated = output.length > maxLen
              ? output.substring(0, maxLen) + '\n\n... (truncated)'
              : output;

            const success = '${{ steps.apply.outcome }}' === 'success';
            const icon = success ? '✅' : '❌';
            const status = success ? 'aplicado exitosamente' : 'FALLÓ';

            const body = `## Terraform Apply — ${icon} ${status}

**PR:** #${{ steps.pr.outputs.PR_NUMBER }}
**Commit aplicado:** \`${{ steps.pr.outputs.HEAD_SHA }}\`
**Merge commit:** \`${{ github.sha }}\`

<details>
<summary>Ver output del apply</summary>

\`\`\`
${truncated}
\`\`\`
</details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.PR_NUMBER }}'),
              body,
            });
