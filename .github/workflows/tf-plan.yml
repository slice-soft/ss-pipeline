name: Terraform Plan (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      terraform-version:
        type: string
        default: "1.9.0"
      plan-prefix:
        description: "Prefix to identify the plan in R2 (e.g. github-iac)"
        type: string
        required: true
    secrets:
      TF_GITHUB_TOKEN:
        required: true
      TF_R2_ACCESS_KEY_ID:
        required: true
      TF_R2_SECRET_ACCESS_KEY:
        required: true
      TF_R2_ENDPOINT:
        required: true
      TF_R2_BUCKET:
        required: true

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working-directory }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
        run: |
          set -o pipefail
          terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan_output.txt
          terraform show -no-color tfplan.binary > plan_readable.txt

      - name: Upload plan to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.TF_R2_ENDPOINT }}
        run: |
          PLAN_KEY="plans/${{ inputs.plan-prefix }}/pr-${{ github.event.pull_request.number }}/${{ github.event.pull_request.head.sha }}.tfplan"
          aws s3 cp ${{ inputs.working-directory }}/tfplan.binary \
            s3://${{ secrets.TF_R2_BUCKET }}/${PLAN_KEY} \
            --region auto
          echo "PLAN_KEY=${PLAN_KEY}" >> $GITHUB_ENV

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
          PLAN_KEY: ${{ env.PLAN_KEY }}
          PLAN_PREFIX: ${{ inputs.plan-prefix }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ secrets.TF_GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const planOutput = fs.readFileSync(path.join(process.env.WORKING_DIR, 'plan_readable.txt'), 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (output truncated, see Actions log for full plan)'
              : planOutput;

            const planId = `${process.env.PLAN_PREFIX}/pr-${process.env.PR_NUMBER}/${process.env.HEAD_SHA}`;

            const body = [
              '## Terraform Plan',
              '',
              `**Plan ID:** \`${planId}\``,
              `**Commit:** \`${process.env.HEAD_SHA}\``,
              '',
              '<details>',
              '<summary>📋 Ver plan completo</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              '> This plan will be applied automatically when the PR is merged.',
              '> If you push new commits, an updated plan will be generated.',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments.data) {
              if (comment.body.includes('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
