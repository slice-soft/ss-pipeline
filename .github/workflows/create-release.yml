name: Release

on:
  workflow_call:
    inputs:
      new-version:
        description: "Version to release"
        required: false
        default: ""
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Provided Version
        id: provided_tag
        if: ${{ inputs.new-version != '' }}
        run: |
          echo "tag=${{ inputs.new-version }}" >> $GITHUB_OUTPUT

      - name: Generate SemVer Tag
        id: generated_tag
        if: ${{ inputs.new-version == '' }}
        uses: K-Phoen/semver-release-action@master
        with:
          release_branch: main
          release_strategy: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Consolidate Tag
        id: tag
        run: |
          if [ -n "${{ inputs.new-version }}" ]; then
            echo "tag=${{ steps.provided_tag.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.generated_tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract Major Version
        id: major_version
        run: echo "tag=$(echo ${{ steps.tag.outputs.tag }} | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false

      - name: Update Major Tag
        run: |
          git tag -f ${{ steps.major_version.outputs.tag }}
          git push origin ${{ steps.major_version.outputs.tag }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}