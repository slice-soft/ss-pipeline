name: CI Go - Test and Coverage

# Reusable workflow for running tests in Go projects.
# Downloads dependencies, runs vet, tests with coverage, and build.
# Supports custom test commands and generates coverage artifacts.
#
# Typical usage:
#   test:
#     uses: slice-soft/ss-pipeline/.github/workflows/ci-go.yml@v0
#     with:
#       go-version: "1.22"
#       test-command: "go test ./... -coverprofile=coverage.out -covermode=atomic"

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.21"
      test-command:
        description: "Custom test command (default: 'go test ./... -coverprofile=coverage.out -covermode=atomic')"
        type: string
        required: false
        default: "go test ./... -coverprofile=coverage.out -covermode=atomic"
      coverage-artifact-name:
        description: "Coverage artifact name (leave empty if not applicable)"
        type: string
        required: false
        default: "coverage"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: ${{ inputs.test-command }}

      - name: Build
        run: go build ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: coverage.out
          retention-days: 1
